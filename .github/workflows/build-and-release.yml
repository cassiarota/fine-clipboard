name: build-and-release

# Builds a self-contained Windows x64 executable.
#  - Push to main / manual run  -> uploads a downloadable build artifact
#  - Push a tag like v0.1.0      -> also publishes a GitHub Release with the zip
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/PasteNowWin/PasteNowWin.csproj

      - name: Publish (self-contained single file, win-x64)
        run: >
          dotnet publish src/PasteNowWin/PasteNowWin.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -o publish

      - name: Package zip
        shell: pwsh
        run: |
          $name = "PasteNowWin-${{ github.ref_name }}-win-x64.zip"
          Compress-Archive -Path publish/* -DestinationPath $name -Force
          echo "ASSET=$name" >> $env:GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PasteNowWin-win-x64
          path: ${{ env.ASSET }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" "${{ env.ASSET }}" `
            --title "PasteNowWin ${{ github.ref_name }}" `
            --generate-notes
